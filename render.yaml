services:
  - type: web
    name: beans-inventory-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/seed.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./beans_inventory.db
      - key: PYTHON_VERSION
        value: 3.11.9
