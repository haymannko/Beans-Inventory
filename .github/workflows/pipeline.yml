# ── Beans Inventory — Unified CI/CD Pipeline ──────────────────────────────────
#
# Professional pipeline with visible job graph in GitHub Actions UI:
#
#   CI ──────────────────┐
#   ├── 🧪 Test Backend  │
#   └── 🧪 Test Frontend │
#                         ▼
#              🐳 Docker Build
#                    │
#          ┌─────────┴─────────┐
#          ▼                   ▼
#   🌐 Deploy Frontend   🚀 Deploy Backend
#   (Vercel)             (Render)
#          │                   │
#          └─────────┬─────────┘
#                    ▼
#           🏥 Health Check
#                    │
#          ┌─────────┴─────────┐
#          ▼                   ▼
#   🔄 Rollback          🧹 Cleanup
#   (if failed)          (old images)
#
# ──────────────────────────────────────────────────────────────────────────────
#
# Required GitHub Secrets:
#   RENDER_API_KEY        — Render API key
#   RENDER_SERVICE_ID     — Render backend service ID
#   DATABASE_URL          — Render PostgreSQL connection string
#   SECRET_KEY            — JWT signing key (openssl rand -hex 32)
#   VERCEL_TOKEN          — Vercel deploy token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID         — Vercel org ID (from .vercel/project.json)
#   VERCEL_PROJECT_ID     — Vercel project ID (from .vercel/project.json)
#
# ──────────────────────────────────────────────────────────────────────────────

name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip tests (emergency deploy)"
        required: false
        default: "false"
        type: boolean
      deploy_only:
        description: "Skip CI, deploy only"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true  # Cancel stale PR runs, never cancel deploys

permissions:
  contents: read
  packages: write  # Push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/beans-inventory/backend

# ══════════════════════════════════════════════════════════════════════════════
# JOBS
# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 1: CI — Run tests in parallel
  # ────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: "🧪 Test Backend"
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_only }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        run: cd backend && pytest --cov=app --cov-report=term tests/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/.coverage
          retention-days: 7

  test-frontend:
    name: "🧪 Test Frontend"
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_only }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Lint
        run: cd frontend && npm run lint
        continue-on-error: true  # Non-blocking

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 2: Docker Build — Build and push container image
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: |
      always() && (
        needs.test-backend.result == 'success' ||
        needs.test-frontend.result == 'success' ||
        inputs.skip_tests ||
        inputs.deploy_only
      )
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 3: Deploy — Deploy frontend and backend in parallel
  # ────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: "🌐 Deploy Frontend"
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && (success() || inputs.deploy_only)
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: cd frontend && vercel --prod --yes --token=$VERCEL_TOKEN --project=$VERCEL_PROJECT_ID

  deploy-backend:
    name: "🚀 Deploy Backend"
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && (success() || inputs.deploy_only)
    outputs:
      deploy_id: ${{ steps.deploy.outputs.deploy_id }}
    steps:
      - name: Trigger Render deploy
        id: deploy
        run: |
          echo "Triggering Render deployment..."
          RESPONSE=$(curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json")

          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$DEPLOY_ID" ]; then
            echo "❌ Failed to trigger deploy"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Deploy triggered: $DEPLOY_ID"

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 4: Verify — Health check after deployment
  # ────────────────────────────────────────────────────────────────────────────
  health-check:
    name: "🏥 Health Check"
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: success()
    outputs:
      healthy: ${{ steps.verify.outputs.healthy }}
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 90

      - name: Verify backend health
        id: verify
        run: |
          # Get actual service URL from Render API
          SERVICE_INFO=$(curl -s \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")

          SERVICE_URL=$(echo "$SERVICE_INFO" | jq -r '.serviceDetails.url // empty')
          if [ -z "$SERVICE_URL" ]; then
            echo "❌ Could not get service URL"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          HEALTH_URL="${SERVICE_URL}/health"
          echo "Health check: $HEALTH_URL"

          for i in $(seq 1 12); do
            echo "Attempt $i/12..."
            HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed"
              cat /tmp/health.json | jq .
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "⏳ Not ready (HTTP $HTTP_CODE), waiting 15s..."
            sleep 15
          done

          echo "❌ Health check failed"
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 5: Rollback — Only if health check fails
  # ────────────────────────────────────────────────────────────────────────────
  rollback:
    name: "🔄 Rollback"
    runs-on: ubuntu-latest
    needs: [health-check, deploy-backend]
    if: failure() && needs.health-check.result == 'failure'
    steps:
      - name: Trigger Render rollback
        run: |
          echo "⚠️ Health check failed — rolling back..."

          PREV_DEPLOY=$(curl -s \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=2" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" | jq -r '.[1].id')

          if [ -n "$PREV_DEPLOY" ] && [ "$PREV_DEPLOY" != "null" ]; then
            echo "Rolling back to: $PREV_DEPLOY"
            curl -s -X POST \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"deploy\": \"$PREV_DEPLOY\"}"
            echo "✅ Rollback triggered"
          else
            echo "❌ No previous deploy found"
          fi

      - name: Annotate failure
        if: always()
        run: echo "::error::🚨 Deployment rolled back — see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 6: Cleanup — Remove old GHCR images
  # ────────────────────────────────────────────────────────────────────────────
  cleanup:
    name: "🧹 Cleanup"
    runs-on: ubuntu-latest
    needs: [health-check]
    if: success()
    steps:
      - name: Prune old container images
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const pkg = '${{ env.IMAGE_NAME }}';
            try {
              const { data: versions } = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                package_type: 'container',
                package_name: pkg,
                username: context.repo.owner,
              });

              const tagged = versions
                .filter(v => v.metadata?.container?.tags?.length > 0)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              for (const v of tagged.slice(5)) {
                try {
                  await github.rest.packages.deletePackageVersionForUser({
                    package_type: 'container',
                    package_name: pkg,
                    username: context.repo.owner,
                    package_version_id: v.id,
                  });
                  console.log(`Deleted: ${v.id}`);
                } catch (e) { console.log(`Skip ${v.id}: ${e.message}`); }
              }
            } catch (e) { console.log(`Cleanup skipped: ${e.message}`); }
# Pipeline trigger
